<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Gaming Experience</title>
    <style>
        :root {
            --brand-color: #00ffcc;
            --bg-dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Refined Launcher Card */
        .experience-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 400px;
        }

        .experience-card:hover {
            transform: translateY(-10px);
            border-color: var(--brand-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .experience-card img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .brand-badge {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--brand-color);
            margin-bottom: 0.5rem;
            display: block;
        }

        /* Hidden Modal with smooth Fade */
        #gameModal {
            visibility: hidden;
            opacity: 0;
            position: fixed;
            inset: 0;
            background: #000;
            transition: opacity 0.5s ease;
            z-index: 2000;
        }

        #gameModal.active {
            visibility: visible;
            opacity: 1;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="experience-card" onclick="launchGame()">
        <span class="brand-badge">Sponsor Spotlight</span>
        <img src="game3.png" alt="Experience Thumbnail">
        <h2 style="margin:0; font-weight: 300;">SEUS NÚMEROS TÊM SORTE?</h2>
        <p style="opacity: 0.6; font-size: 0.9rem; margin-top: 10px;">Toque para iniciar a experiência interativa</p>
    </div>

    <div id="gameModal">
        <div class="close-btn" onclick="closeGame()">✕</div>
        <iframe id="gameFrame" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <script>
        function launchGame() {
            const modal = document.getElementById('gameModal');
            const frame = document.getElementById('gameFrame');
            
            frame.src = "Game3/index.html";
            modal.classList.add('active');

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }

        function closeGame() {
            const modal = document.getElementById('gameModal');
            modal.classList.remove('active');
            setTimeout(() => { document.getElementById('gameFrame').src = ""; }, 500);
            
            if (document.exitFullscreen) document.exitFullscreen();
        }
    </script>
</body>
</html>
